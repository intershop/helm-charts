apiVersion: v2
appVersion: "14.0.1"
description: Intershop Commerce Management - ICM
# name and version must be in this exact order, otherwise bump2version won't work
name: icm
version: 2.22.0-alpha
dependencies:
  - name: icm-as
    version: 2.15.0-alpha
    repository: file://../icm-as
  - name: icm-web
    version: 0.20.0-alpha
    repository: file://../icm-web
    condition: icm-web.enabled
  - name: kubernetes-ingress
    alias: ingress-haproxy
    version: 1.49.0
    repository: https://haproxytech.github.io/helm-charts
    condition: ingress-haproxy.enabled
  - name: mailhog
    version: 5.2.0
    repository: https://codecentric.github.io/helm-charts
    condition: mailhog.enabled
  - name: redis
    version: 17.15.2
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: redis-cluster
    version: 8.6.12
    repository: https://charts.bitnami.com/bitnami
    condition: redis-cluster.enabled
